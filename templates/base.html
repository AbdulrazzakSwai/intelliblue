<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBlue SOC Application</title>
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}">
    
    <link rel="preload" as="image" href="{{ url_for('static', filename='intelliblue_logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            850: '#1f2937', 
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        },
                        cyber: {
                            blue: '#0ea5e9',
                            cyan: '#06b6d4',
                            neon: '#38bdf8',
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        .prose code {
            color: #ef4444 !important;
            font-family: 'Courier New', Courier, monospace !important;
            background-color: #111827 !important; 
            padding: 0.2rem 0.4rem !important;
            border-radius: 0.25rem !important;
            font-weight: 500 !important;
        }

        .prose code::before, .prose code::after {
            content: none !important;
        }

        .prose pre code {
            color: #e5e7eb !important;
            background-color: transparent !important;
            padding: 0 !important;
            font-weight: normal !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
        
        <div class="h-16 flex items-center px-6 border-b border-gray-700 bg-gray-900">
            <img src="{{ url_for('static', filename='intelliblue_logo.png') }}" alt="IntelliBlue Logo" class="h-14 w-auto mr-0 drop-shadow-md pb-1">
            <span class="text-xl font-bold tracking-wider text-white font-display uppercase shadow-cyber-blue drop-shadow-lg">IntelliBlue</span>
        </div>
        
        <nav class="flex-1 px-4 py-6 flex flex-col min-h-0">
            <div class="space-y-2 flex-shrink-0">
                <a href="{{ url_for('dashboard') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'dashboard' %}bg-gray-700 text-cyber-neon font-semibold shadow-lg{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-gauge-high w-6 drop-shadow-sm"></i> Dashboard
                </a>
                <a href="{{ url_for('logs') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'logs' %}bg-gray-700 text-cyber-neon font-semibold shadow-lg{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-server w-6 drop-shadow-sm"></i> Log Management
                </a>
                <a href="{{ url_for('alerts') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'alerts' %}bg-gray-700 text-cyber-neon font-semibold shadow-lg{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-triangle-exclamation w-6 text-yellow-500 fa-fade drop-shadow-sm" style="--fa-animation-duration: 3s;"></i> Active Alerts
                </a>
                <a href="{{ url_for('reports') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'reports' %}bg-gray-700 text-cyber-neon font-semibold shadow-lg{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-file-shield w-6 drop-shadow-sm"></i> Archived Reports
                </a>
            </div>

            <div class="pt-6 pb-2 flex justify-between items-center px-4 flex-shrink-0">
                <p class="text-xs uppercase text-gray-400 font-bold tracking-widest font-display">AI Assistant</p>
            </div>

            <a href="{{ url_for('new_chat') }}" class="flex-shrink-0 flex items-center justify-center px-4 py-3 rounded-lg transition-all duration-300 font-bold bg-gradient-to-r from-cyber-blue to-blue-600 hover:from-cyber-neon hover:to-cyber-blue text-white shadow-[0_0_15px_rgba(14,165,233,0.3)] hover:shadow-[0_0_20px_rgba(56,189,248,0.5)] mb-2 group">
                <i class="fa-solid fa-plus mr-2 group-hover:rotate-90 transition-transform duration-300"></i> New Chat
            </a>

            <div class="px-2 mt-2 space-y-1 flex-1 overflow-y-auto min-h-0">
                {% for s in global_chat_sessions %}
                <div class="group relative flex items-center">
                    <a href="{{ url_for('chat', session_id=s.id) }}" id="sidebar-session-{{ s.id }}" class="flex-1 flex items-center px-3 py-2 pr-8 text-xs rounded-md transition-colors w-full overflow-hidden {% if request.view_args and request.view_args.get('session_id') == s.id %}bg-gray-700 text-cyber-neon font-semibold border border-gray-600{% else %}text-gray-400 hover:bg-gray-700 hover:text-white border border-transparent{% endif %}">
                        <i class="fa-regular fa-comments mr-2 text-gray-500 shrink-0 group-hover:text-cyber-blue transition-colors"></i>
                        <span class="truncate block w-full sidebar-title-text">{{ s.title }}</span>
                    </a>
                    <form action="{{ url_for('delete_chat', session_id=s.id) }}" method="POST" class="absolute right-2 opacity-0 group-hover:opacity-100 transition-opacity" onsubmit="showDeleteModal(event, this, 'Are you sure you want to permanently delete this chat?');">
                        <button type="submit" class="text-gray-500 hover:text-red-400 transition-colors cursor-pointer" title="Delete Chat">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </form>
                </div>
                {% endfor %}
            </div>
        </nav>
        
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500 text-center font-display tracking-wide">
            System Status: <span class="text-cyber-neon font-semibold drop-shadow-[0_0_5px_rgba(56,189,248,0.8)]"><i class="fa-solid fa-circle-dot fa-beat-fade text-[10px] mr-1" style="--fa-animation-duration: 2s;"></i>Online</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 bg-gray-900 border-b border-gray-700 flex items-center justify-between px-8 shadow-sm relative z-10">
            <h2 class="text-2xl font-bold font-display text-transparent bg-clip-text bg-gradient-to-r from-gray-100 to-gray-400">
                {% block title %}Dashboard{% endblock %}
            </h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm font-medium text-gray-400 font-display flex items-center bg-gray-800 px-3 py-1 rounded-full border border-gray-700"><i class="fa-solid fa-microchip text-cyber-blue mr-2"></i>Local LLM Active</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-850 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-800 via-gray-900 to-black">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <div id="customDeleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity">
        <div class="modal-content transform scale-95 opacity-0 transition-all duration-200 bg-gray-900 border border-red-900/50 rounded-xl shadow-[0_0_30px_rgba(220,38,38,0.15)] p-8 w-96 text-center">
            <div class="text-red-500 mb-4 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]">
                <i class="fa-solid fa-skull-crossbones text-5xl fa-shake" style="--fa-animation-duration: 3s;"></i>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2 font-display uppercase tracking-wide">Confirm Deletion</h3>
            <p id="customDeleteModalMsg" class="text-gray-400 text-sm mb-6"></p>
            <div class="flex justify-center space-x-4">
                <button onclick="cancelDelete()" type="button" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-semibold transition">Cancel</button>
                <button onclick="confirmDelete()" type="button" class="px-5 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg font-semibold transition shadow-lg shadow-red-500/30">Clear</button>
            </div>
        </div>
    </div>

    <script>
        let formToSubmit = null;

        function showDeleteModal(event, formElement, message) {
            event.preventDefault();

            const modal = document.getElementById('customDeleteModal');
            const msgEl = document.getElementById('customDeleteModalMsg');
            msgEl.textContent = message;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('.modal-content').classList.remove('scale-95', 'opacity-0');
                modal.querySelector('.modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);

            formToSubmit = formElement;
        }

        function cancelDelete() {
            const modal = document.getElementById('customDeleteModal');
            modal.querySelector('.modal-content').classList.remove('scale-100', 'opacity-100');
            modal.querySelector('.modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
            formToSubmit = null;
        }

        function confirmDelete() {
            if (formToSubmit) {
                formToSubmit.submit();
            }
        }
    </script>
    </link>
</body>
</html>
