<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBlue SOC</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom scrollbar to match the dark theme */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        /* Custom styling for inline AI commands (Markdown backticks) */
        .prose code {
            color: #ef4444 !important; /* Tailwind Red-500 */
            font-family: 'Courier New', Courier, monospace !important;
            background-color: #111827 !important; 
            padding: 0.2rem 0.4rem !important;
            border-radius: 0.25rem !important;
            font-weight: 500 !important; /* Reduced from 600 to 500 for a cleaner look */
        }

        /* Removes the default pseudo-backticks Tailwind tries to add */
        .prose code::before, .prose code::after {
            content: none !important;
        }

        /* Prevents massive multi-line script blocks from turning entirely red */
        .prose pre code {
            color: #e5e7eb !important;
            background-color: transparent !important;
            padding: 0 !important;
            font-weight: normal !important;
        }

        /* Smooth fade-in for chat bubbles */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
        
        <div class="h-16 flex items-center px-6 border-b border-gray-700">
            <i class="fa-solid fa-shield-halved text-blue-500 text-2xl mr-3"></i>
            <span class="text-xl font-bold tracking-wider text-white">IntelliBlue</span>
        </div>
        
        <nav class="flex-1 px-4 py-6 flex flex-col min-h-0">
            <div class="space-y-2 flex-shrink-0">
                <a href="{{ url_for('dashboard') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'dashboard' %}bg-gray-700 text-white font-semibold shadow{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-chart-line w-6"></i> Dashboard
                </a>
                <a href="{{ url_for('logs') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'logs' %}bg-gray-700 text-white font-semibold shadow{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-file-lines w-6"></i> Log Management
                </a>
                <a href="{{ url_for('alerts') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'alerts' %}bg-gray-700 text-white font-semibold shadow{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-triangle-exclamation w-6 text-yellow-500"></i> Active Alerts
                </a>
                <a href="{{ url_for('reports') }}" class="flex items-center px-4 py-3 rounded-lg transition-colors {% if request.endpoint == 'reports' %}bg-gray-700 text-white font-semibold shadow{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                    <i class="fa-solid fa-clipboard-check w-6"></i> Archived Reports
                </a>
            </div>

            <div class="pt-6 pb-2 flex justify-between items-center px-4 flex-shrink-0">
                <p class="text-xs uppercase text-gray-500 font-bold">AI Assistant</p>
            </div>

            <a href="{{ url_for('new_chat') }}" class="flex-shrink-0 flex items-center justify-center px-4 py-3 rounded-lg transition-colors border text-white font-bold bg-blue-600 hover:bg-blue-500 border-blue-500 shadow-lg mb-2">
                <i class="fa-solid fa-plus mr-2"></i> New Chat
            </a>

            <!-- Directly embedded Session List -->
            <div class="px-2 mt-2 space-y-1 flex-1 overflow-y-auto min-h-0">
                {% for s in global_chat_sessions %}
                <div class="group relative flex items-center">
                    <a href="{{ url_for('chat', session_id=s.id) }}" id="sidebar-session-{{ s.id }}" class="flex-1 flex items-center px-3 py-2 pr-8 text-xs rounded-md transition-colors w-full overflow-hidden {% if request.view_args and request.view_args.get('session_id') == s.id %}bg-gray-700 text-white font-semibold border border-gray-600{% else %}text-gray-400 hover:bg-gray-700 hover:text-white border border-transparent{% endif %}">
                        <i class="fa-regular fa-message mr-2 text-gray-500 shrink-0"></i>
                        <span class="truncate block w-full sidebar-title-text">{{ s.title }}</span>
                    </a>
                    <form action="{{ url_for('delete_chat', session_id=s.id) }}" method="POST" class="absolute right-2 opacity-0 group-hover:opacity-100 transition-opacity" onsubmit="showDeleteModal(event, this, 'Are you sure you want to permanently delete this chat?');">
                        <button type="submit" class="text-gray-500 hover:text-red-400 transition-colors cursor-pointer" title="Delete Chat">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </form>
                </div>
                {% endfor %}
            </div>
        </nav>
        
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500 text-center">
            System Status: <span class="text-green-500 font-semibold"><i class="fa-solid fa-circle text-[8px] mr-1"></i>Online</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-8">
            <h2 class="text-xl font-semibold text-gray-100">
                {% block title %}Dashboard{% endblock %}
            </h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-400"><i class="fa-solid fa-network-wired mr-2"></i>Local LLM Active</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-900">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- Custom Delete Modal -->
    <div id="customDeleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 transition-opacity">
        <div class="modal-content transform scale-95 opacity-0 transition-all duration-200 bg-gray-800 border border-gray-700 rounded-lg shadow-2xl p-6 w-96 text-center">
            <div class="text-red-500 mb-4 animate-pulse">
                <i class="fa-solid fa-triangle-exclamation text-5xl"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Confirm Deletion</h3>
            <p id="customDeleteModalMsg" class="text-gray-400 text-sm mb-6"></p>
            <div class="flex justify-center space-x-4">
                <button onclick="cancelDelete()" type="button" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-semibold transition">Cancel</button>
                <button onclick="confirmDelete()" type="button" class="px-5 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg font-semibold transition shadow-lg shadow-red-500/30">Clear</button>
            </div>
        </div>
    </div>

    <script>
        let formToSubmit = null;

        function showDeleteModal(event, formElement, message) {
            event.preventDefault(); // Stop normal submission

            const modal = document.getElementById('customDeleteModal');
            const msgEl = document.getElementById('customDeleteModalMsg');
            msgEl.textContent = message;
            
            // show modal
            modal.classList.remove('hidden');
            // small delay for animation
            setTimeout(() => {
                modal.querySelector('.modal-content').classList.remove('scale-95', 'opacity-0');
                modal.querySelector('.modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);

            // Save form element
            formToSubmit = formElement;
        }

        function cancelDelete() {
            const modal = document.getElementById('customDeleteModal');
            modal.querySelector('.modal-content').classList.remove('scale-100', 'opacity-100');
            modal.querySelector('.modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
            formToSubmit = null;
        }

        function confirmDelete() {
            if (formToSubmit) {
                formToSubmit.submit();
            }
        }
    </script>
</body>
</html>
