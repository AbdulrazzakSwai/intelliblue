{% extends 'base.html' %}

{% block title %}IntelliBlue Chat Assistant{% endblock %}

{% block content %}
<div class="flex flex-col h-full bg-gray-800 rounded-lg shadow-lg border border-gray-700">
    
    <div id="chatWindow" class="flex-1 p-6 overflow-y-auto space-y-4">
        
        {% for msg in history %}
            {% if msg.sender == 'User' %}
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white p-3 rounded-l-lg rounded-br-lg max-w-2xl shadow">{{ msg.text }}
                    </div>
                </div>
            {% else %}
                <div class="flex justify-start {% if loop.first and history|length == 1 %}animate-fade-in{% endif %}">
                    <div class="bg-gray-700 text-gray-200 p-4 rounded-r-lg rounded-bl-lg max-w-2xl shadow border border-gray-600">
                        <span class="font-bold text-blue-400 text-xs uppercase block mb-2 border-b border-gray-600 pb-1">
                            <i class="fa-solid fa-robot mr-1"></i> IntelliBlue
                        </span>
                        <div {% if loop.first and history|length == 1 %}data-welcome="true"{% endif %} class="ai-message-content prose prose-invert prose-base max-w-none">{{ msg.text }}</div>
                    </div>
                </div>
            {% endif %}
        {% endfor %}
        
    </div>

    <div class="p-4 bg-gray-900 border-t border-gray-700 rounded-b-lg">
        <form id="chatForm" class="flex space-x-4" onsubmit="sendMessage(event)">
            <input type="text" id="userInput" autocomplete="off" placeholder="Ask about an alert, request mitigation steps..." 
                   class="flex-1 bg-gray-800 text-white placeholder-gray-500 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <button type="button" id="stopBtn" class="hidden bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-lg font-semibold transition shadow-lg flex items-center" onclick="stopMessage()">
                <span>Stop</span> <i class="fa-solid fa-stop ml-2"></i>
            </button>
            <button type="submit" id="sendBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-semibold transition shadow-lg flex items-center">
                <span>Send</span> <i class="fa-solid fa-paper-plane ml-2"></i>
            </button>
        </form>
    </div>
</div>

<script>
const activeSessionId = "{{ active_session.id }}";
const chatWindow = document.getElementById('chatWindow');
let abortController = null;

    // 1. Auto-parse history on page load
    window.onload = function() {
        const historyBubbles = document.querySelectorAll('.ai-message-content');
        historyBubbles.forEach(bubble => {
            const rawText = bubble.textContent; // <-- CHANGE THIS LINE
            bubble.innerHTML = marked.parse(rawText);
            
            // If it's the welcome message (marked by the unique data-welcome attribute), animate it!
            if (bubble.hasAttribute('data-welcome')) {
                // Clear the parsed text immediately to prepare for typing
                const targetText = rawText;
                bubble.innerHTML = '';
                
                // Block user input while typing
                const userInputField = document.getElementById('userInput');
                const userSendBtn = document.getElementById('sendBtn');
                userInputField.disabled = true;
                userSendBtn.disabled = true;
                userInputField.placeholder = "IntelliBlue is typing...";
                userInputField.classList.add('opacity-50', 'cursor-not-allowed');
                userSendBtn.classList.add('opacity-50', 'cursor-not-allowed');

                // Keep UI smooth by revealing characters
                let renderedWelcome = "";
                let charIndex = 0;
                
                const welcomeInterval = setInterval(() => {
                    const charsToReveal = 2; // Reveal one char per tick 
                    if (charIndex < targetText.length) {
                        renderedWelcome += targetText.substring(charIndex, charIndex + charsToReveal);
                        let html = marked.parse(renderedWelcome);
                        html = html.replace(/<\/p>$/, ' <span class="inline-block w-2 h-4 bg-blue-400/70 animate-pulse rounded-sm align-middle ml-1"></span></p>');
                        bubble.innerHTML = html;
                        charIndex += charsToReveal;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    } else {
                        // Done typing, remove cursor
                        bubble.innerHTML = marked.parse(renderedWelcome);
                        clearInterval(welcomeInterval);
                        
                        // Restore user input
                        userInputField.disabled = false;
                        userSendBtn.disabled = false;
                        userInputField.placeholder = "Ask about an alert, request mitigation steps...";
                        userInputField.classList.remove('opacity-50', 'cursor-not-allowed');
                        userSendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        userInputField.focus();
                    }
                }, 10); // Faster visual tick interval
            }
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
    };

    function stopMessage() {
        if (abortController) {
            abortController.abort();
        }
    }

    function updateSidebarTitle(newTitle) {
        const sessionLink = document.getElementById('sidebar-session-' + activeSessionId);
        if (sessionLink) {
            const titleSpan = sessionLink.querySelector('.sidebar-title-text');
            if (titleSpan) {
                // Clear and type out the new title
                titleSpan.innerHTML = '';
                let index = 0;
                const titleInterval = setInterval(() => {
                    if (index < newTitle.length) {
                        titleSpan.textContent += newTitle[index];
                        index++;
                    } else {
                        clearInterval(titleInterval);
                    }
                }, 50); // fast typing speed for the title
            }
        }
    }

    async function sendMessage(event) {
        event.preventDefault();
        
        const inputField = document.getElementById('userInput');
        const message = inputField.value.trim();
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        if (!message) return;

        // Append User message
        inputField.value = '';
        appendMessage('User', message);
        sendBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');

        // Small delay to make interaction feel more natural before AI "starts typing"
        await new Promise(resolve => setTimeout(resolve, 300));

        // Create an empty bubble for the AI response
        const aiBubbleId = appendMessage('IntelliBlue', '<span class="text-gray-400 italic">Thinking<span id="loadingDots-' + Date.now() + '"></span></span>');
        const aiBubbleElement = document.getElementById(aiBubbleId);
        
        // Setup the animated dots logic
        const dotsElement = aiBubbleElement.querySelector('span[id^="loadingDots-"]');
        let dotCount = 0;
        const dotsInterval = setInterval(() => {
            if (dotsElement) {
                dotCount = (dotCount + 1) % 4;
                dotsElement.innerText = '.'.repeat(dotCount);
            }
        }, 400);

        // Add a smooth fade-in reveal class to the bubble wrapper
        aiBubbleElement.parentElement.classList.add('animate-fade-in');

        abortController = new AbortController();
        let rawMarkdown = ""; // We will accumulate the raw text here
        let renderedMarkdown = ""; // The smoothly revealed text
        let sessionTitle = null;
        let isStreaming = true;
        let startedTyping = false;

        // Smooth character-by-character trickle instead of blocky word jumps
        const typeInterval = setInterval(() => {
            let activeRaw = rawMarkdown;

            // Instantly transition buttons and finish the visual text generation when the main stream ends
            if (activeRaw.includes('|||END_STREAM|||')) {
                sendBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                activeRaw = activeRaw.replace('|||END_STREAM|||', ''); // Erase it so it never types
            }

            if (activeRaw.includes('|||TITLE|||')) {
                const parts = activeRaw.split('|||TITLE|||');
                activeRaw = parts[0]; // Mask the tag from typing out into the chat bubble
                if (!sessionTitle && parts[1].length > 0) {
                    sessionTitle = parts[1];
                    updateSidebarTitle(sessionTitle);
                }
            }

            if (renderedMarkdown.length < activeRaw.length) {
                if (!startedTyping) {
                    clearInterval(dotsInterval);
                    startedTyping = true;
                }
                
                // Reveal a few characters at a time based on how far behind the buffer is
                const charsToAdd = Math.max(1, Math.ceil((activeRaw.length - renderedMarkdown.length) / 4));
                renderedMarkdown += activeRaw.substring(renderedMarkdown.length, renderedMarkdown.length + charsToAdd);
                
                const isScrolledToBottom = Math.abs(chatWindow.scrollHeight - chatWindow.clientHeight - chatWindow.scrollTop) < 50;
                
                // Parse and append a fading cursor
                let html = marked.parse(renderedMarkdown);
                if (isStreaming) {
                    html = html.replace(/<\/p>$/, ' <span class="inline-block w-2 h-4 bg-blue-400/70 animate-pulse rounded-sm align-middle ml-1"></span></p>');
                }
                aiBubbleElement.innerHTML = html;
                
                if (isScrolledToBottom) {
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            } else if (!isStreaming) {
                // Final clean render without cursor once stream is fully caught up
                aiBubbleElement.innerHTML = marked.parse(renderedMarkdown);
                clearInterval(typeInterval);
            }
        }, 16); // ~60fps smooth rendering

        try {
            const response = await fetch('{{ url_for("api_chat") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, session_id: activeSessionId }),
                signal: abortController.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                rawMarkdown += decoder.decode(value, { stream: true });
            }
        } catch (error) {
            if (error.name !== 'AbortError') {
                clearInterval(dotsInterval);
                aiBubbleElement.innerText = "Error connecting to the backend.";
            } else {
                // User interrupted the fetch
                rawMarkdown += "\n\n*(user interruption)*";
                
                // If the stream interrupted before the backend sent the TITLE tag, we construct the fallback title directly on the frontend.
                const currentSessionLink = document.getElementById('sidebar-session-' + activeSessionId);
                if (!sessionTitle && currentSessionLink) {
                    const currentTitle = currentSessionLink.querySelector('.sidebar-title-text').textContent;
                    // Because Flask only saves "Generating Title..." to backend and doesn't push it early down the socket, 
                    // the front-end will actually just still say "New Chat". Let's check for that instead!
                    if (currentTitle === "New Chat" || currentTitle === "Generating Title...") {
                        const words = message.split(' ').filter(w => w.trim() !== '');
                        
                        // First strip markdown from the raw words so the FIRST letter is actually a letter, not a * or #
                        const cleanWords = words.slice(0, 3).map(w => w.replace(/[*_#`~>\[\]]/g, ''));
                        
                        // Then safely capitalize the clean words
                        let capitalizedWords = cleanWords.map(w => w ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : "");
                        
                        let fallbackTitle = capitalizedWords.join(' ') + (words.length > 3 ? "..." : "");
                        
                        if (fallbackTitle.length > 40) {
                             fallbackTitle = fallbackTitle.substring(0, 37) + "...";
                        }
                        
                        sessionTitle = fallbackTitle;
                        updateSidebarTitle(fallbackTitle);
                    }
                }
            }
        } finally {
            clearInterval(dotsInterval); // ensure it's cleared if stopped immediately
            isStreaming = false; // signals the interval to shut down naturally
            // We moved the send / stop button resetting to the frontend loop above so they pop up instantly!
            abortController = null;
        }
    }

    // Helper function to draw chat bubbles
    function appendMessage(sender, text) {
        const wrapper = document.createElement('div');
        const uniqueId = 'msg-' + Date.now();

        if (sender === 'User') {
            wrapper.className = 'flex justify-end';
            wrapper.innerHTML = `
                <div class="bg-blue-600 text-white p-3 rounded-l-lg rounded-br-lg max-w-2xl shadow whitespace-pre-wrap">${text}</div>
            `;
        } else {
            wrapper.className = 'flex justify-start';
            // Notice the "prose prose-invert" class added here. This triggers Tailwind's beautiful Markdown styling!
            wrapper.innerHTML = `
                <div class="bg-gray-700 text-gray-200 p-4 rounded-r-lg rounded-bl-lg max-w-2xl shadow border border-gray-600">
                    <span class="font-bold text-blue-400 text-xs uppercase block mb-2 border-b border-gray-600 pb-1">
                        <i class="fa-solid fa-robot mr-1"></i> IntelliBlue
                    </span>
                    <div id="${uniqueId}" class="ai-message-content prose prose-invert prose-base max-w-none">${text}</div>
                </div>
            `;
        }
        
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return uniqueId;
    }
</script>
{% endblock %}
