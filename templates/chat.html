{% extends 'base.html' %}

{% block title %}IntelliBlue Chat Assistant{% endblock %}

{% block content %}
<div class="flex flex-col h-full bg-gray-900/50 backdrop-blur-md rounded-xl shadow-[0_8px_30px_rgba(0,0,0,0.6)] border border-gray-700 overflow-hidden">
    
    <div id="chatWindow" class="flex-1 p-6 overflow-y-auto space-y-6">
        
        {% for msg in history %}
            {% if msg.sender == 'User' %}
                <div class="flex justify-end">
                    <div class="bg-gradient-to-br from-cyber-blue to-blue-700 text-white p-4 rounded-2xl rounded-tr-sm max-w-2xl shadow-[0_4px_15px_rgba(14,165,233,0.3)] font-sans border border-blue-500/30 user-message-text" data-raw-text="{{ msg.text|urlencode }}">
                        <div class="flex items-center mb-1 pb-1 border-b border-blue-400/30 opacity-80 justify-end">
                            <span class="text-[10px] uppercase tracking-widest font-display font-medium mr-2">You</span>
                            <i class="fa-solid fa-user-astronaut text-xs"></i>
                        </div>
                        {{ msg.text }}
                    </div>
                </div>
            {% else %}
                <div class="flex justify-start {% if loop.first and history|length == 1 %}animate-fade-in{% endif %}">
                    <div class="bg-gray-800 text-gray-200 p-5 rounded-2xl rounded-tl-sm max-w-2xl shadow-[0_4px_15px_rgba(0,0,0,0.4)] border border-gray-700 relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-cyber-neon to-cyber-blue opacity-80 group-hover:opacity-100 transition-opacity"></div>
                        <span class="font-bold text-cyber-neon text-xs uppercase tracking-widest block mb-3 border-b border-gray-700 pb-2 font-display flex items-center">
                            <i class="fa-solid fa-robot mr-2 drop-shadow-[0_0_5px_rgba(56,189,248,0.8)]"></i> IntelliBlue AI
                        </span>
                        <div {% if loop.first and history|length == 1 %}data-welcome="true"{% endif %} class="ai-message-content prose prose-invert prose-base max-w-none text-gray-300 font-sans leading-relaxed">{{ msg.text }}</div>
                    </div>
                </div>
            {% endif %}
        {% endfor %}
        
        <div id="regenerateContainer" class="hidden flex justify-start my-2 max-w-2xl">
            <button type="button" onclick="resendLastPrompt()" class="flex items-center text-xs font-display tracking-widest uppercase text-gray-400 hover:text-cyber-neon transition-colors px-4 py-2 rounded-lg bg-gray-800/80 border border-gray-700 hover:border-cyber-blue shadow-sm">
                <i class="fa-solid fa-rotate-right mr-2"></i> Resend Last Prompt
            </button>
        </div>

    </div>

    <div class="p-5 bg-gray-850 border-t border-gray-700">
        <form id="chatForm" class="flex space-x-4" onsubmit="sendMessage(event)">
            <div class="flex-1 flex bg-gray-900 border border-gray-600 rounded-lg overflow-hidden focus-within:border-cyber-blue focus-within:shadow-[0_0_10px_rgba(14,165,233,0.3)] transition-all duration-300">
                <div class="bg-gray-800 border-r border-gray-700 flex items-center px-3 group">
                    <i class="fa-solid fa-paperclip text-gray-400 group-hover:text-cyber-neon transition-colors"></i>
                </div>
                <select id="alertContext" class="bg-gray-800 text-gray-300 border-r border-gray-700 px-3 py-4 focus:outline-none max-w-[220px] truncate text-sm hover:bg-gray-700 cursor-pointer font-display tracking-wide font-medium appearance-none">
                    <option value="">No context attached</option>
                    {% for alert in global_alerts %}
                        <option value="{{ alert.id }}">🔗 {{ alert.title }}</option>
                    {% endfor %}
                </select>
                <input type="text" id="userInput" autocomplete="off" placeholder="Ask IntelliBlue about threats, logs, or mitigations..." 
                       class="flex-1 bg-transparent text-white placeholder-gray-500 px-5 py-4 focus:outline-none font-sans">
            </div>
            
            <button type="button" id="stopBtn" class="hidden bg-red-600 hover:bg-red-500 text-white px-6 py-4 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(220,38,38,0.4)] flex items-center font-display tracking-wider hover:scale-105" onclick="stopMessage()">
                <span>STOP</span> <i class="fa-solid fa-power-off ml-2"></i>
            </button>
            <button type="submit" id="sendBtn" class="bg-gradient-to-r from-cyber-blue to-blue-600 hover:from-cyber-neon hover:to-cyber-blue text-white px-8 py-4 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(14,165,233,0.4)] hover:shadow-[0_0_20px_rgba(56,189,248,0.6)] flex items-center font-display tracking-wider group hover:scale-105">
                <span>SEND</span> <i class="fa-solid fa-paper-plane ml-3 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>
    </div>
</div>

<script>
const activeSessionId = "{{ active_session.id }}";
const chatWindow = document.getElementById('chatWindow');
let abortController = null;
let currentRequestId = null;

    window.onload = function() {
        const historyBubbles = document.querySelectorAll('.ai-message-content');
        historyBubbles.forEach(bubble => {
            const rawText = bubble.textContent;
            bubble.innerHTML = DOMPurify.sanitize(marked.parse(rawText));
            
            if (bubble.hasAttribute('data-welcome')) {
                const targetText = rawText;
                bubble.innerHTML = '';
                
                const userInputField = document.getElementById('userInput');
                const userSendBtn = document.getElementById('sendBtn');
                const alertContextSelect = document.getElementById('alertContext');
                userInputField.disabled = true;
                userSendBtn.disabled = true;
                alertContextSelect.disabled = true;
                userInputField.placeholder = "IntelliBlue is typing...";
                userInputField.classList.add('opacity-50', 'cursor-not-allowed');
                userSendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                alertContextSelect.classList.add('opacity-50', 'cursor-not-allowed');

                let renderedWelcome = "";
                let charIndex = 0;
                
                const welcomeInterval = setInterval(() => {
                    const charsToReveal = 2;
                    if (charIndex < targetText.length) {
                        renderedWelcome += targetText.substring(charIndex, charIndex + charsToReveal);
                        let html = DOMPurify.sanitize(marked.parse(renderedWelcome));
                        html = html.replace(/<\/p>$/, ' <span class="inline-block w-2 h-4 bg-blue-400/70 animate-pulse rounded-sm align-middle ml-1"></span></p>');
                        bubble.innerHTML = html;
                        charIndex += charsToReveal;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    } else {
                        bubble.innerHTML = DOMPurify.sanitize(marked.parse(renderedWelcome));
                        clearInterval(welcomeInterval);
                        
                        userInputField.disabled = false;
                        userSendBtn.disabled = false;
                        alertContextSelect.disabled = false;
                        userInputField.placeholder = "Ask about an alert, request mitigation steps...";
                        userInputField.classList.remove('opacity-50', 'cursor-not-allowed');
                        userSendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        alertContextSelect.classList.remove('opacity-50', 'cursor-not-allowed');
                        
                        const urlParams = new URLSearchParams(window.location.search);
                        const autoAlertId = urlParams.get('auto_alert');
                        if (autoAlertId) {
                            let selectHasOption = Array.from(alertContextSelect.options).some(option => option.value === autoAlertId);
                            if (selectHasOption) {
                                alertContextSelect.value = autoAlertId;
                                userInputField.value = "I need help investigating this specific alert. What should my first step be?";
                            }
                        }
                        
                        userInputField.focus();
                    }
                }, 10);
            }
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
        showRegenerateButton();
    };

    function showRegenerateButton() {
        const btn = document.getElementById('regenerateContainer');
        const userMessages = document.querySelectorAll('.user-message-text');
        if (btn && userMessages.length > 0) {
            chatWindow.appendChild(btn); 
            btn.classList.remove('hidden');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    }

    function hideRegenerateButton() {
        const btn = document.getElementById('regenerateContainer');
        if (btn) {
            btn.classList.add('hidden');
        }
    }

    function resendLastPrompt() {
        sendMessage(null, true);
    }

    function stopMessage() {
        if (abortController) {
            abortController.abort();
        }
    }

    function updateSidebarTitle(newTitle) {
        const sessionLink = document.getElementById('sidebar-session-' + activeSessionId);
        if (sessionLink) {
            const titleSpan = sessionLink.querySelector('.sidebar-title-text');
            if (titleSpan) {
                titleSpan.innerHTML = '';
                let index = 0;
                const titleInterval = setInterval(() => {
                    if (index < newTitle.length) {
                        titleSpan.textContent += newTitle[index];
                        index++;
                    } else {
                        clearInterval(titleInterval);
                    }
                }, 50);
            }
        }
    }

    async function sendMessage(event, regenerate = false) {
        if (event) event.preventDefault();
        
        let requestId = Date.now();
        currentRequestId = requestId;

        if (regenerate && abortController) {
            abortController.abort();
        }

        hideRegenerateButton();
        
        const inputField = document.getElementById('userInput');
        const alertContextSelect = document.getElementById('alertContext');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        let message = inputField.value.trim();
        let selectedAlertId = alertContextSelect.value;

        if (!regenerate) {
            if (!message) return;
            inputField.value = '';
            
            let displayMessage = message;
            if (selectedAlertId) {
                const selectedText = alertContextSelect.options[alertContextSelect.selectedIndex].text.replace('Attach: ', '');
                displayMessage = message + `\n\n*(Attached Reference: ${selectedText})*`;
                alertContextSelect.value = "";
            }
            
            appendMessage('User', displayMessage);
        } else {
            const userMessages = document.querySelectorAll('.user-message-text');
            if (userMessages.length === 0) return;
            
            message = decodeURIComponent(userMessages[userMessages.length - 1].getAttribute('data-raw-text'));
            message = message.replace(/\n\n\*\([^)]+\)\*$/, '').trim();

            const aiMessages = document.querySelectorAll('.ai-message-content');
            if (aiMessages.length > 0) {
                const lastAiContainer = aiMessages[aiMessages.length - 1].closest('.flex.justify-start');
                if (lastAiContainer) lastAiContainer.remove();
            }
        }
        
        sendBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');

        await new Promise(resolve => setTimeout(resolve, 300));

        const aiBubbleId = appendMessage('IntelliBlue', '<span class="text-gray-400 italic">Thinking<span id="loadingDots-' + Date.now() + '"></span></span>');
        const aiBubbleElement = document.getElementById(aiBubbleId);
        
        const dotsElement = aiBubbleElement.querySelector('span[id^="loadingDots-"]');
        let dotCount = 0;
        const dotsInterval = setInterval(() => {
            if (dotsElement) {
                dotCount = (dotCount + 1) % 4;
                dotsElement.innerText = '.'.repeat(dotCount);
            }
        }, 400);

        aiBubbleElement.parentElement.classList.add('animate-fade-in');

        abortController = new AbortController();
        let rawMarkdown = "";
        let renderedMarkdown = "";
        let sessionTitle = null;
        let isStreaming = true;
        let startedTyping = false;
        let regenerateBtnShown = false;

        const typeInterval = setInterval(() => {
            let activeRaw = rawMarkdown;

            if (activeRaw.includes('|||END_STREAM|||')) {
                sendBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                if (!regenerateBtnShown) {
                    showRegenerateButton();
                    regenerateBtnShown = true;
                }
                activeRaw = activeRaw.replace('|||END_STREAM|||', '');
            }

            if (activeRaw.includes('|||TITLE|||')) {
                const parts = activeRaw.split('|||TITLE|||');
                activeRaw = parts[0];
                if (!sessionTitle && parts[1].length > 0) {
                    sessionTitle = parts[1];
                    updateSidebarTitle(sessionTitle);
                }
            }

            if (renderedMarkdown.length < activeRaw.length) {
                if (!startedTyping) {
                    clearInterval(dotsInterval);
                    startedTyping = true;
                }
                
                const charsToAdd = Math.max(1, Math.ceil((activeRaw.length - renderedMarkdown.length) / 4));
                renderedMarkdown += activeRaw.substring(renderedMarkdown.length, renderedMarkdown.length + charsToAdd);
                
                const isScrolledToBottom = Math.abs(chatWindow.scrollHeight - chatWindow.clientHeight - chatWindow.scrollTop) < 50;
                
                let html = DOMPurify.sanitize(marked.parse(renderedMarkdown));
                if (isStreaming) {
                    html = html.replace(/<\/p>$/, ' <span class="inline-block w-2 h-4 bg-blue-400/70 animate-pulse rounded-sm align-middle ml-1"></span></p>');
                }
                aiBubbleElement.innerHTML = html;
                
                if (isScrolledToBottom) {
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            } else if (!isStreaming) {
                aiBubbleElement.innerHTML = DOMPurify.sanitize(marked.parse(renderedMarkdown));
                clearInterval(typeInterval);
            }
        }, 16);

        try {
            const response = await fetch('{{ url_for("api_chat") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, session_id: activeSessionId, alert_id: selectedAlertId, regenerate: regenerate }),
                signal: abortController.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                rawMarkdown += decoder.decode(value, { stream: true });
            }
        } catch (error) {
            if (error.name !== 'AbortError') {
                clearInterval(dotsInterval);
                aiBubbleElement.innerText = "Error connecting to the backend.";
                sendBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
            } else {
                rawMarkdown += "\n\n*(user interruption)*";
                
                if (currentRequestId === requestId) {
                    sendBtn.classList.remove('hidden');
                    stopBtn.classList.add('hidden');
                    if (!regenerateBtnShown) {
                        showRegenerateButton();
                        regenerateBtnShown = true;
                    }
                }
                
                const currentSessionLink = document.getElementById('sidebar-session-' + activeSessionId);
                if (!sessionTitle && currentSessionLink) {
                    const currentTitle = currentSessionLink.querySelector('.sidebar-title-text').textContent;
                    if (currentTitle === "New Chat" || currentTitle === "Generating Title...") {
                        const words = message.split(' ').filter(w => w.trim() !== '');
                        
                        const cleanWords = words.slice(0, 3).map(w => w.replace(/[*_#`~>\[\]]/g, ''));
                        
                        let capitalizedWords = cleanWords.map(w => w ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : "");
                        
                        let fallbackTitle = capitalizedWords.join(' ') + (words.length > 3 ? "..." : "");
                        
                        if (fallbackTitle.length > 40) {
                             fallbackTitle = fallbackTitle.substring(0, 37) + "...";
                        }
                        
                        sessionTitle = fallbackTitle;
                        updateSidebarTitle(fallbackTitle);
                    }
                }
            }
        } finally {
            clearInterval(dotsInterval);
            isStreaming = false;
            if (currentRequestId === requestId) {
                abortController = null;
                showRegenerateButton();
            }
        }
    }

    function appendMessage(sender, text) {
        const wrapper = document.createElement('div');
        const uniqueId = 'msg-' + Date.now();

        if (sender === 'User') {
            wrapper.className = 'flex justify-end';
            wrapper.innerHTML = `
                <div class="bg-gradient-to-br from-cyber-blue to-blue-700 text-white p-4 rounded-2xl rounded-tr-sm max-w-2xl shadow-[0_4px_15px_rgba(14,165,233,0.3)] font-sans border border-blue-500/30 user-message-text" data-raw-text="${encodeURIComponent(text)}">
                    <div class="flex items-center mb-1 pb-1 border-b border-blue-400/30 opacity-80 justify-end">
                        <span class="text-[10px] uppercase tracking-widest font-display font-medium mr-2">You</span>
                        <i class="fa-solid fa-user-astronaut text-xs"></i>
                    </div>
                    ${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
                </div>
            `;
        } else {
            wrapper.className = 'flex justify-start';
            wrapper.innerHTML = `
                <div class="bg-gray-800 text-gray-200 p-5 rounded-2xl rounded-tl-sm max-w-2xl shadow-[0_4px_15px_rgba(0,0,0,0.4)] border border-gray-700 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-cyber-neon to-cyber-blue opacity-80 group-hover:opacity-100 transition-opacity"></div>
                    <span class="font-bold text-cyber-neon text-xs uppercase tracking-widest block mb-3 border-b border-gray-700 pb-2 font-display flex items-center">
                        <i class="fa-solid fa-robot mr-2 drop-shadow-[0_0_5px_rgba(56,189,248,0.8)]"></i> IntelliBlue AI
                    </span>
                    <div id="${uniqueId}" class="ai-message-content prose prose-invert prose-base max-w-none font-sans leading-relaxed">${text}</div>
                </div>
            `;
        }
        
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return uniqueId;
    }
</script>
{% endblock %}
